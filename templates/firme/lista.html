{% extends "base.html" %}
{% block title %}Firme - Manager Angajati{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Firme</h2>
    <a href="{{ url_for('firma_noua') }}" class="btn btn-success"><i class="bi bi-building-add"></i> Firma Noua</a>
</div>
<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead><tr><th>Cod</th><th>Nume</th><th>Nr. Angajati</th><th>Actiuni</th></tr></thead>
            <tbody>
            {% for f in firme %}
            <tr>
                <td><span class="badge bg-primary fs-6">{{ f.cod }}</span></td>
                <td>{{ f.nume }}</td>
                <td>{{ f.angajati|length }}</td>
                <td>
                    <a href="{{ url_for('edit_firma', id=f.id) }}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-pencil"></i> Editeaza
                    </a>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="4" class="text-center text-muted p-4">Nicio firma.</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
